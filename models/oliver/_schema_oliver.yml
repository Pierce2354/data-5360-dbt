version: 2

models:
  - name: oliver_dim_customer
    description: "Oliver's Customer Dimension"
  - name: oliver_dim_date
    description: "Oliver's Date Dimension"
  - name: oliver_dim_employee
    description: "Oliver's Employee Dimension"
  - name: oliver_dim_product
    description: "Oliver's Product Dimension"
  - name: oliver_dim_store
    description: "Oliver's Store Dimension"
  - name: fact_sales
    description: "Oliver's Sales Fact Table"
  - name: sales
    description: "Oliver's Semantic Layer for Sales Analysis"
  - name: stg_employee_certifications
    description: |
      Staging model for employee certifications.
      Parses the certification_json field into individual columns:
      certification_name, certification_cost, and certification_awarded_date.
  - name: fact_certification
    description: |
      Employee Certification Fact.
      The grain of this table is one row per employee per certification awarded date.
      Each record represents a certification received by an employee on a given date.